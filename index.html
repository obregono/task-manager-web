<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        
        <div id="authSection">
            <h1>Bienvenido</h1>
            <div class="auth-form">
                <input type="text" id="usernameInput" placeholder="Usuario">
                <input type="password" id="passwordInput" placeholder="Contraseña">
                <button id="loginBtn">Iniciar Sesión</button>
                <button id="registerBtn">Registrarse</button>
            </div>
            <p id="authMessage" style="text-align: center; color: #ff5252;"></p>
        </div>

        <div id="taskSection" style="display: none;">
            
            <div class="task-header">
                <h1 style="margin-bottom: 0;">Mis Tareas</h1>
                <button id="logoutBtn">Salir</button>
            </div>

            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Nueva tarea...">
                <button id="addTaskBtn">Agregar tarea</button>
            </div>

            <ul id="taskList"></ul>
            
            <p id="emptyMessage" style="display: none;">No hay tareas pendientes.</p>
        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
